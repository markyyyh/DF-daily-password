name: Daily Password

on:

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"


jobs:

  run:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install packages
        run: |
          pip install requests beautifulsoup4


      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          python bot.py
